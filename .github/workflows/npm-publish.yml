# .github/workflows/npm-publish.yml
name: Publish to NPM

on:
  push:
    branches: [main, master]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Only test on Node versions supported by your dependencies
        # rolldown, vite, vitest require: ^20.19.0 || >=22.12.0
        node-version: [20, 22]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run build:typecheck

      - name: Run linter self-check
        run: npm run lint:self || true

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

  publish:
    needs: test
    runs-on: ubuntu-latest
    # ✅ Run on push to main, or on non-prerelease releases
    if: github.event_name == 'push' || (github.event_name == 'release' && github.event.release.prerelease == false)
    permissions:
      contents: read
      id-token: write  # Required for npm provenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Use a single, stable LTS version for publishing
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      # ✅ Only verify version on release events (skip for branch pushes)
      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Package version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi
        shell: bash

      - name: Publish to NPM
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}