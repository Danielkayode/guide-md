name: react-component
description: React-specific rules including hooks patterns, functional components only, and prop validation
version: "1.0.0"
author: GuideMD Team
license: MIT
content:
  guide_version: "1.0.0"
  language: typescript
  framework: react
  strict_typing: true
  error_protocol: verbose
  code_style:
    max_line_length: 100
    indentation: "2 spaces"
    naming_convention: PascalCase
    max_function_lines: 40
    prefer_immutability: true
    prefer_early_returns: true
  guardrails:
    no_hallucination: true
    scope_creep_prevention: true
    dry_run_on_destructive: false
    max_response_scope: function
  context:
    entry_points:
      - src/components
      - src/hooks
      - src/app
    architecture_pattern: layered
  description: "React application with functional components, hooks, and strict TypeScript typing"
