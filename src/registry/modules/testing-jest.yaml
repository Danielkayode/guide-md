name: testing-jest
description: Jest/Vitest patterns with coverage thresholds and test file naming conventions
version: "1.0.0"
author: GuideMD Team
license: MIT
content:
  guide_version: "1.0.0"
  strict_typing: true
  error_protocol: verbose
  code_style:
    max_line_length: 100
    indentation: "2 spaces"
    naming_convention: camelCase
    max_function_lines: 50
    prefer_immutability: true
    prefer_early_returns: true
  guardrails:
    no_hallucination: true
    scope_creep_prevention: true
    dry_run_on_destructive: false
    max_response_scope: function
  testing:
    required: true
    framework: vitest
    coverage_threshold: 80
    test_alongside_code: true
  context:
    entry_points:
      - src/
      - tests/
      - __tests__/
    off_limits:
      - node_modules/
      - coverage/
      - dist/
  description: "Test-driven development with high coverage requirements and test patterns"
