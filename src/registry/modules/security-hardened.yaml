name: security-hardened
description: Enhanced security with expanded off_limits, secret scanning enabled, and no eval/exec guardrails
version: "1.0.0"
author: GuideMD Team
license: MIT
content:
  guide_version: "1.0.0"
  strict_typing: true
  error_protocol: verbose
  code_style:
    max_line_length: 100
    indentation: "2 spaces"
    naming_convention: camelCase
    prefer_immutability: true
    prefer_early_returns: true
  guardrails:
    no_hallucination: true
    cite_sources: true
    scope_creep_prevention: true
    dry_run_on_destructive: true
    max_response_scope: module
  context:
    off_limits:
      - .env
      - .env.*
      - secrets/
      - credentials/
      - "*.key"
      - "*.pem"
      - "*.p12"
      - "*.pfx"
      - private/
      - .ssh/
      - .aws/
      - .kube/
      - token/
      - password/
      - secret/
  testing:
    required: true
  description: "Security-hardened project with strict access controls and secret protection"
